# Local-only databases for CareerOps.
#
# Usage:
#   docker compose up -d        # start Postgres + Redis in the background
#   docker compose down         # stop them (data persists)
#   docker compose down -v      # stop AND wipe data
#
# Then in your .env:
#   DATABASE_URL=postgres://careerops:careerops@localhost:5432/careerops
#   REDIS_URL=redis://localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: careerops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: careerops
      POSTGRES_PASSWORD: careerops
      POSTGRES_DB: careerops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careerops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
